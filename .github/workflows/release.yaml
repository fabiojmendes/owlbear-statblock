name: Release

on:
  push:
    branches:
      - master

# CRITICAL: release-please requires these permissions to create tags,
# update the CHANGELOG.md, and manage the Release PR.
permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    # We expose the outputs so the next job knows if it should run
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          # 'node' handles standard package.json version bumping
          release-type: node
